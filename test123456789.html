<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhetysu University - Chemistry CLIL</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { 
  /* Стэнфорд түстері: Cardinal Red (#8C1515) және Black (#2E2D29) */
  --primary: #8C1515; 
  --secondary: #2E2D29; 
  --bg: #F4F4F4;
  --white: #FFFFFF;
  --text: #2E2D29;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --transition: all 0.25s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Montserrat', sans-serif; 
  background-color: var(--bg); 
  color: var(--text); 
  line-height: 1.6;
}

header { 
  background: var(--white); 
  padding: 30px 20px; 
  text-align: center; 
  border-bottom: 3px solid var(--primary);
  box-shadow: var(--shadow);
}

.uni-info h1 { 
  color: var(--primary); 
  font-size: 1.3rem; 
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.uni-info p { 
  color: var(--secondary); 
  font-weight: 600; 
  font-size: 0.95rem;
  opacity: 0.9;
}

.hero { 
  background: var(--secondary); 
  color: var(--white); 
  padding: 60px 20px 100px; 
  text-align: center;
}

.hero h2 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }

.container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

.reg-card { 
  background: var(--white); 
  padding: 40px; 
  border-radius: 12px; 
  box-shadow: var(--shadow); 
  margin-top: -50px; 
}

.input-group {
  display: flex;
  gap: 15px;
  margin-bottom: 35px;
}

input { 
  flex: 1;
  font-family: inherit;
  padding: 14px 18px; 
  border: 1px solid #CCC; 
  border-radius: 8px; 
  font-size: 1rem;
  transition: var(--transition);
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(140, 21, 21, 0.1);
}

.section-title {
  font-size: 0.9rem;
  text-transform: uppercase;
  color: var(--primary);
  font-weight: 700;
  letter-spacing: 1.5px;
  margin: 35px 0 15px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 2px;
  background: #EEE;
}

.menu-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
  gap: 15px; 
}

.menu-btn { 
  background: var(--white); 
  border: 1px solid #DDD; 
  color: var(--secondary); 
  padding: 22px; 
  border-radius: 8px; 
  cursor: pointer; 
  font-size: 1.05rem; 
  font-weight: 600; 
  transition: var(--transition);
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-btn:hover { 
  background: #FFF9F9;
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(140, 21, 21, 0.08);
}

/* "Ғылыми мақала" батырмасы енді басқаларымен бірдей */
.full-width { 
  grid-column: 1 / -1; 
}

.test-box { display: none; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: var(--shadow); }
.active { display: block; }

.question { 
  margin-bottom: 20px; 
  padding: 25px; 
  border-radius: 8px;
  background: #FAFAFA; 
  border-left: 5px solid var(--primary);
}

.question p { font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; }

label {
  display: block;
  padding: 12px 15px;
  margin-bottom: 8px;
  border-radius: 6px;
  background: white;
  border: 1px solid #EEE;
  cursor: pointer;
  transition: var(--transition);
}

label:hover { border-color: var(--primary); background: #FFF9F9; }

.submit-btn { 
  background: var(--primary); 
  color: var(--white); 
  padding: 18px; 
  border: none; 
  border-radius: 8px; 
  font-size: 1.1rem; 
  font-weight: 700; 
  cursor: pointer; 
  width: 100%; 
  margin-top: 25px;
}

.submit-btn:hover { background: #701111; }

@media (max-width: 600px) {
  .input-group { flex-direction: column; }
  .uni-info h1 { font-size: 1.1rem; }
}
</style>
</head>
<body>

<header>
  <div class="uni-info">
    <!-- Университет атауы толық қалпында -->
    <h1>Ілияс Жансүгіров атындағы Жетісу университеті</h1>
    <p>Жаратылыстану-техникалық факультеті</p>
    <p style="font-size: 0.85rem; opacity: 0.7;">Жаратылыстану пәндер кафедрасы</p>
  </div>
</header>

<div id="main-view">
  <section class="hero">
    <h2>Chemistry CLIL tests</h2>
    <p>Білім беру платформасына қош келдіңіз</p>
  </section>

  <div class="container">
    <div class="reg-card">
      <div class="input-group">
        <input type="text" id="userName" placeholder="Аты-жөніңіз / Full Name">
        <input type="text" id="userGroup" placeholder="Тобыңыз / Group">
      </div>
      
      <div class="section-title">Органикалық химия</div>
      <div class="menu-grid">
        <button class="menu-btn" onclick="startTest('alkandap')">Алкандар <span>→</span></button>
        <button class="menu-btn" onclick="startTest('alkender')">Алкендер <span>→</span></button>
      </div>

      <div class="section-title">Аналитикалық химия</div>
      <div class="menu-grid">
        <button class="menu-btn" onclick="startTest('massalar')">Массалар заңы <span>→</span></button>
        <button class="menu-btn" onclick="startTest('eritindi')">Иондық күш <span>→</span></button>
      </div>

      <div class="section-title">Ғылыми-зерттеу жұмысын ұйымдастыру</div>
      <div class="menu-grid">
        <!-- Фон енді қара емес, басқа батырмалармен бірдей стильде -->
        <button class="menu-btn full-width" onclick="startTest('gylymi')">Ғылыми мақала<span>→</span></button>
      </div>
    </div>
  </div>
</div>

<div id="test-view" class="container" style="margin-top: 40px;"></div>

<script>
/* quizData және негізгі функциялар сол қалпында сақталады */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOty53LwQzR5bmsQ--YI93JL7ohWhNVzqsxvanGX7cXR4tUaBLNcmDrgLLtMdOw1NvZA/exec';

const quizData = {
  'alkandap': { 
    discipline: 'Органикалық химия',
    title: 'Алкандар',
    questions: [
      { q: "What is the general formula of alkanes?", a: ["CnH2n", "CnH2n+2", "CnH2n-2", "CnHn"], c: 1 },
      { q: "The hybrid state of carbon atoms in alkanes is:", a: ["sp", "sp2", "sp3", "dsp2"], c: 2 },
      { q: "What is the bond angle in methane (CH4)?", a: ["90°", "120°", "109.5°", "180°"], c: 2 },
      { q: "The simplest alkane is:", a: ["Ethane", "Methane", "Propane", "Butane"], c: 1 },
      { q: "Алкандарға тән реакция түрі:", a: ["Қосылу", "Орын басу (Substitution)", "Полимерлену", "Гидратация"], c: 1 }
    ]
  },
  'alkender': { 
    discipline: 'Органикалық химия',
    title: 'Алкендер',
    questions: [
      { q: "What is the general formula of alkenes?", a: ["CnH2n+2", "CnH2n", "CnH2n-2", "CnH2n-6"], c: 1 },
      { q: "Alkenes contain at least one ______ bond.", a: ["Single", "Double", "Triple", "Ionic"], c: 1 },
      { q: "Hybridization of carbon in the double bond is:", a: ["sp3", "sp", "sp2", "dsp2"], c: 2 }
    ]
  },
  'massalar': { 
    discipline: 'Аналитикалық химия',
    title: 'Әрекеттесуші массалар заңы', 
    questions: [
      { q: "Who proposed the Law of Mass Action?", a: ["Le Chatelier", "Guldberg and Waage", "Arrhenius", "Ostwald"], c: 1 },
      { q: "Reaction rate is proportional to the product of ______ of reactants.", a: ["Mass", "Volume", "Active masses (concentrations)", "Temperature"], c: 2 }
    ]
  },
  'eritindi': { 
    discipline: 'Аналитикалық химия',
    title: 'Иондық күш пен активтілік', 
    questions: [
      { q: "Ionic strength (mu) was introduced by:", a: ["Arrhenius", "Lewis and Randall", "Debye", "Hückel"], c: 1 },
      { q: "Activity (a) is related to concentration (c) by:", a: ["a = c/f", "a = f·c", "a = f+c", "a = f^c"], c: 1 }
    ]
  },
  'gylymi': { 
    discipline: 'Ғылыми-зерттеу жұмысы',
    title: 'Ғылыми мақала жазу негіздері', 
    questions: [
      { q: "What is the standard structure of a research article?", a: ["IMRAD", "ABCC", "H-index", "DOI"], c: 0 },
      { q: "IMRaD stands for Introduction, Methods, Results, and ______.", a: ["Data", "Diagram", "Discussion", "Description"], c: 2 }
    ]
  }
};

function startTest(id) {
  const name = document.getElementById('userName').value;
  const group = document.getElementById('userGroup').value;
  if(!name || !group) return alert("Аты-жөніңіз бен тобыңызды жазыңыз!");

  const test = quizData[id];
  let html = `<div class="test-box active">
    <button class="menu-btn" style="padding:10px 20px; font-size:0.9rem; margin-bottom:30px; width: auto;" onclick="location.reload()">← Артқа</button>
    <h2 style="margin-bottom:30px; color:var(--primary);">${test.title}</h2>
    <form id="quiz-form">`;

  test.questions.forEach((item, i) => {
    html += `<div class="question"><p>${i+1}. ${item.q}</p>`;
    item.a.forEach((opt, j) => {
      html += `<label><input type="radio" name="q${i}" value="${j}" required> <span>${opt}</span></label>`;
    });
    html += `</div>`;
  });

  html += `<button type="button" id="submit-btn" class="submit-btn" onclick="finishTest('${id}')">Нәтижені жіберу</button></form></div>`;
  
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('test-view').innerHTML = html;
  window.scrollTo(0,0);
}

function finishTest(id) {
  const btn = document.getElementById('submit-btn');
  const form = document.getElementById('quiz-form');
  const test = quizData[id];
  
  if (!form.checkValidity()) return alert("Барлық сұраққа жауап беріңіз!");

  let score = 0;
  test.questions.forEach((q, i) => {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if(sel && parseInt(sel.value) === q.c) score++;
  });

  btn.disabled = true;
  btn.innerText = "Жіберілуде...";

  const data = {
    name: document.getElementById('userName').value.trim(),
    group: document.getElementById('userGroup').value.trim(),
    discipline: test.discipline,
    topic: test.title,
    score: score,
    total: test.questions.length
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(() => {
    alert(`Тест аяқталды! Нәтижеңіз: ${score}/${test.questions.length}`);
    location.reload();
  }).catch(() => {
    alert("Қате кетті. Интернетті тексеріңіз.");
    btn.disabled = false;
  });
}
</script>
</body>
</html>
