<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhetysu University - Chemistry CLIL</title>
<!-- Заманауи шрифт қосу -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { 
  --primary: #D21F3C; /* Tango Red */
  --secondary: #1A1A1A; /* Deep Black */
  --bg: #F8F9FA;
  --white: #FFFFFF;
  --text: #2D3436;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Montserrat', sans-serif; 
  background-color: var(--bg); 
  color: var(--text); 
  line-height: 1.6;
}

/* Header стилі */
header { 
  background: var(--white); 
  padding: 20px; 
  text-align: center; 
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.uni-info h1 { 
  color: var(--secondary); 
  font-size: 1.2rem; 
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
}

.uni-info p { 
  color: var(--primary); 
  font-weight: 600; 
  font-size: 0.9rem;
  margin-top: 5px;
}

/* Hero секциясы - заманауи градиент */
.hero { 
  background: linear-gradient(135deg, var(--secondary) 0%, #333 100%); 
  color: var(--white); 
  padding: 80px 20px 120px; 
  text-align: center;
  position: relative;
}

.hero h2 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; }
.hero p { opacity: 0.8; font-weight: 400; font-size: 1.1rem; }

/* Контейнер мен Карталар */
.container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

.reg-card { 
  background: var(--white); 
  padding: 40px; 
  border-radius: 20px; 
  box-shadow: var(--shadow); 
  margin-top: -60px; 
  position: relative;
  z-index: 10;
}

.input-group {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

input { 
  flex: 1;
  min-width: 280px;
  font-family: inherit;
  padding: 15px 20px; 
  border: 2px solid #EEE; 
  border-radius: 12px; 
  font-size: 1rem;
  transition: var(--transition);
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(210, 31, 60, 0.1);
}

/* Секция тақырыптары */
.section-title {
  font-size: 0.9rem;
  text-transform: uppercase;
  color: #999;
  letter-spacing: 2px;
  margin: 40px 0 20px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #EEE;
}

/* Тест батырмаларының торы */
.menu-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
  gap: 15px; 
}

.menu-btn { 
  background: var(--white); 
  border: 1px solid #EEE; 
  color: var(--secondary); 
  padding: 25px; 
  border-radius: 16px; 
  cursor: pointer; 
  font-size: 1.1rem; 
  font-weight: 600; 
  transition: var(--transition);
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.menu-btn::after {
  content: "→";
  font-size: 1.5rem;
  opacity: 0;
  transform: translateX(-10px);
  transition: var(--transition);
}

.menu-btn:hover { 
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(210, 31, 60, 0.05);
}

.menu-btn:hover::after {
  opacity: 1;
  transform: translateX(0);
}

.full-width { 
  grid-column: 1 / -1; 
  background: var(--secondary);
  color: var(--white);
  border: none;
}

.full-width:hover {
  background: var(--primary);
  color: var(--white);
}

/* Тест сұрақтары */
.question { 
  margin-bottom: 20px; 
  padding: 30px; 
  border-radius: 16px;
  background: var(--white); 
  border: 1px solid #EEE;
}

.question p { font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; color: var(--secondary); }

label {
  display: block;
  padding: 15px 20px;
  margin-bottom: 10px;
  border-radius: 10px;
  background: #F8F9FA;
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid transparent;
}

label:hover { background: #EEE; }

input[type="radio"]:checked + span { color: var(--primary); font-weight: 600; }

.submit-btn { 
  background: var(--primary); 
  color: var(--white); 
  padding: 20px; 
  border: none; 
  border-radius: 12px; 
  font-size: 1.1rem; 
  font-weight: 700; 
  cursor: pointer; 
  width: 100%; 
  margin-top: 30px;
  transition: var(--transition);
}

.submit-btn:hover { background: #b01832; transform: scale(1.01); }

/* Мобильді бейімделу */
@media (max-width: 600px) {
  .hero h2 { font-size: 1.6rem; }
  .reg-card { padding: 25px; }
  .input-group { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <div class="uni-info">
    <h1>Жетісу Университеті</h1>
    <p>Chemistry CLIL Education Platform</p>
  </div>
</header>

<div id="main-view">
  <section class="hero">
    <h2>Студенттердің білімін бағалау</h2>
    <p>Төмендегі тесттердің бірін таңдап, біліміңізді тексеріңіз</p>
  </section>

  <div class="container">
    <div class="reg-card">
      <div class="input-group">
        <input type="text" id="userName" placeholder="Толық аты-жөніңіз">
        <input type="text" id="userGroup" placeholder="Оқу тобыңыз">
      </div>
      
      <div class="section-title">Органикалық химия</div>
      <div class="menu-grid">
        <button class="menu-btn" onclick="startTest('alkandap')">Алкандар</button>
        <button class="menu-btn" onclick="startTest('alkender')">Алкендер</button>
      </div>

      <div class="section-title">Аналитикалық химия</div>
      <div class="menu-grid">
        <button class="menu-btn" onclick="startTest('massalar')">Массалар заңы</button>
        <button class="menu-btn" onclick="startTest('eritindi')">Иондық күш</button>
      </div>

      <div class="section-title">Зерттеу жұмысы</div>
      <div class="menu-grid">
        <button class="menu-btn full-width" onclick="startTest('gylymi')">Ғылыми мақала жазу негіздері</button>
      </div>
    </div>
  </div>
</div>

<div id="test-view" class="container" style="margin-top: 40px;"></div>

<script>
/* quizData мен функциялардың логикасы сол күйінде сақталады */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOty53LwQzR5bmsQ--YI93JL7ohWhNVzqsxvanGX7cXR4tUaBLNcmDrgLLtMdOw1NvZA/exec';

const quizData = {
  // ... (деректер сол күйінде қалады)
  'alkandap': { 
    discipline: 'Органикалық химия',
    title: 'Алкандар',
    questions: [
      { q: "What is the general formula of alkanes?", a: ["CnH2n", "CnH2n+2", "CnH2n-2", "CnHn"], c: 1 },
      { q: "The hybrid state of carbon atoms in alkanes is:", a: ["sp", "sp2", "sp3", "dsp2"], c: 2 },
      { q: "What is the bond angle in methane (CH4)?", a: ["90°", "120°", "109.5°", "180°"], c: 2 },
      { q: "The simplest alkane is:", a: ["Ethane", "Methane", "Propane", "Butane"], c: 1 },
      { q: "Алкандарға тән реакция түрі:", a: ["Қосылу", "Орын басу (Substitution)", "Полимерлену", "Гидратация"], c: 1 }
    ]
  },
  'alkender': { 
    discipline: 'Органикалық химия',
    title: 'Алкендер',
    questions: [
      { q: "What is the general formula of alkenes?", a: ["CnH2n+2", "CnH2n", "CnH2n-2", "CnH2n-6"], c: 1 },
      { q: "Alkenes contain at least one ______ bond.", a: ["Single", "Double", "Triple", "Ionic"], c: 1 },
      { q: "Hybridization of carbon in the double bond is:", a: ["sp3", "sp", "sp2", "dsp2"], c: 2 }
    ]
  },
  'massalar': { 
    discipline: 'Аналитикалық химия',
    title: 'Әрекеттесуші массалар заңы', 
    questions: [
      { q: "Who proposed the Law of Mass Action?", a: ["Le Chatelier", "Guldberg and Waage", "Arrhenius", "Ostwald"], c: 1 },
      { q: "Reaction rate is proportional to the product of ______ of reactants.", a: ["Mass", "Volume", "Active masses (concentrations)", "Temperature"], c: 2 }
    ]
  },
  'eritindi': { 
    discipline: 'Аналитикалық химия',
    title: 'Иондық күш пен активтілік', 
    questions: [
      { q: "Ionic strength (mu) was introduced by:", a: ["Arrhenius", "Lewis and Randall", "Debye", "Hückel"], c: 1 },
      { q: "Activity (a) is related to concentration (c) by:", a: ["a = c/f", "a = f·c", "a = f+c", "a = f^c"], c: 1 }
    ]
  },
  'gylymi': { 
    discipline: 'Ғылыми-зерттеу жұмысы',
    title: 'Ғылыми мақала жазу негіздері', 
    questions: [
      { q: "What is the standard structure of a research article?", a: ["IMRAD", "ABCC", "H-index", "DOI"], c: 0 },
      { q: "IMRaD stands for Introduction, Methods, Results, and ______.", a: ["Data", "Diagram", "Discussion", "Description"], c: 2 }
    ]
  }
};

function startTest(id) {
  const name = document.getElementById('userName').value;
  const group = document.getElementById('userGroup').value;
  if(!name || !group) return alert("Аты-жөніңіз бен тобыңызды жазыңыз!");

  const test = quizData[id];
  let html = `<div class="test-box active">
    <button class="menu-btn" style="padding:10px 20px; font-size:0.9rem; margin-bottom:30px; width: auto;" onclick="location.reload()">← Артқа</button>
    <h2 style="margin-bottom:30px; color:var(--secondary);">${test.title}</h2>
    <form id="quiz-form">`;

  test.questions.forEach((item, i) => {
    html += `<div class="question"><p>${i+1}. ${item.q}</p>`;
    item.a.forEach((opt, j) => {
      html += `<label><input type="radio" name="q${i}" value="${j}" required> <span>${opt}</span></label>`;
    });
    html += `</div>`;
  });

  html += `<button type="button" id="submit-btn" class="submit-btn" onclick="finishTest('${id}')">Нәтижені растау</button></form></div>`;
  
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('test-view').innerHTML = html;
  window.scrollTo(0,0);
}

function finishTest(id) {
  const btn = document.getElementById('submit-btn');
  const form = document.getElementById('quiz-form');
  const test = quizData[id];
  
  if (!form.checkValidity()) return alert("Барлық сұраққа жауап беріңіз!");

  let score = 0;
  test.questions.forEach((q, i) => {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if(sel && parseInt(sel.value) === q.c) score++;
  });

  btn.disabled = true;
  btn.innerText = "Жіберілуде...";

  const data = {
    name: document.getElementById('userName').value.trim(),
    group: document.getElementById('userGroup').value.trim(),
    discipline: test.discipline,
    topic: test.title,
    score: score,
    total: test.questions.length
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(() => {
    alert(`Тест аяқталды! Нәтижеңіз: ${score}/${test.questions.length}`);
    location.reload();
  }).catch(() => {
    alert("Қате кетті. Интернетті тексеріңіз.");
    btn.disabled = false;
  });
}
</script>
</body>
</html>
