function startTest(id) {
  const name = document.getElementById('userName').value;
  const group = document.getElementById('userGroup').value;
  if(!name || !group) return alert("Аты-жөніңіз бен тобыңызды жазыңыз!");

  const test = quizData[id];
  let html = `<div class="test-box active">
    <button class="menu-btn" style="padding:8px 15px; font-size:12pt; margin-bottom:20px; width: auto;" onclick="location.reload()">← Мәзірге қайту</button>
    <h2 style="color:var(--zu-blue); margin-bottom:20px; border-bottom: 2px solid var(--zu-gold); padding-bottom: 10px;">${test.title}</h2>
    <form id="quiz-form">`;

  test.questions.forEach((item, i) => {
    html += `<div class="question"><p style="font-weight:bold;">${i+1}. ${item.q}</p>`;
    item.a.forEach((opt, j) => {
      html += `<label style="display:block; margin:12px 0; cursor:pointer;"><input type="radio" name="q${i}" value="${j}" required> ${opt}</label>`;
    });
    html += `</div>`;
  });

  html += `
    <div class="status-container">
      <button type="button" id="submit-btn" class="submit-btn" onclick="finishTest('${id}')">Нәтижені жіберу</button>
      <div id="status-text"></div>
    </div>
  </form></div>`;
  
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('test-view').innerHTML = html;
  window.scrollTo(0,0);
}

function finishTest(id) {
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('status-text');
  const form = document.getElementById('quiz-form');
  const test = quizData[id];
  
  let score = 0;
  test.questions.forEach((q, i) => {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if(sel && parseInt(sel.value) === q.c) score++;
  });

  btn.disabled = true;
  btn.innerText = "Жіберілуде...";
  status.style.display = "block";
  status.className = "loading";
  status.innerText = "Деректер базасына жіберілуде, күте тұрыңыз...";

  const data = {
    name: document.getElementById('userName').value,
    group: document.getElementById('userGroup').value,
    topic: test.title,
    score: score,
    total: test.questions.length
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(data)
  }).then(() => {
    status.className = "success";
    status.innerText = "Нәтиже мұғалімге жіберілді!";
    btn.style.display = "none"; 
    
    setTimeout(() => {
      alert(`Тест аяқталды! Сіздің нәтижеңіз: ${score}/${test.questions.length}`);
      location.reload();
    }, 2000);
  }).catch(err => {
    btn.disabled = false;
    btn.innerText = "Қайта жіберу";
    status.innerText = "Қате кетті. Интернетті тексеріп, қайта көріңіз.";
    status.style.color = "red";
  });
}
