<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CLIL Chemistry Tests</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f4f7f9; }
h1 { text-align: center; color: #2c3e50; }
.menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
.menu-btn { padding: 25px; background: #34495e; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; }
.menu-btn:hover { background: #1abc9c; transform: translateY(-2px); }
.test-page { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.active { display: block; }
.q { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
.q p { font-weight: 600; color: #2c3e50; margin-bottom: 10px; }
.name-box { margin-bottom: 25px; padding: 20px; background: #fff; border-radius: 10px; border: 1px solid #dcdde1; }
input[type="text"] { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 5px; }
.submit-btn { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
.back-btn { background: #7f8c8d; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="main-menu">
  <h1>🧪 Химия: CLIL Тесттер жүйесі</h1>
  <div class="name-box">
    <label>Аты-жөніңіз / Full Name:</label>
    <input type="text" id="studentName" placeholder="Мысалы: Сыдыков Асетбек">
    <br><br>
    <label>Тобыңыз / Group:</label>
    <input type="text" id="studentGroup" placeholder="Мысалы: ХПМ111">
  </div>

  <div class="menu">
    <button class="menu-btn" onclick="openTest('alkandар')">Органикалық химия<br><b>Алкандар</b></button>
    <button class="menu-btn" onclick="openTest('alkender')">Органикалық химия<br><b>Алкендер</b></button>
    <button class="menu-btn" onclick="openTest('massalar')">Аналитикалық химия<br><b>Әрекеттесуші массалар заңы</b></button>
    <button class="menu-btn" onclick="openTest('eritindi')">Аналитикалық химия<br><b>Иондық күш және активтілік</b></button>
    <button class="menu-btn" onclick="openTest('gylymi')" style="grid-column: span 2;"><b>Ғылыми мақала жазу негіздері</b></button>
  </div>
</div>

<div id="test-container">
  <!-- Тесттер осында динамикалы түрде ашылады -->
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOty53LwQzR5bmsQ--YI93JL7ohWhNVzqsxvanGX7cXR4tUaBLNcmDrgLLtMdOw1NvZA/exec';

const tests = {
  'alkandар': {
    subj: 'Органикалық химия', topic: 'Алкандар',
    qs: [
      { q: "What is the general formula of alkanes?", opts: ["CnH2n", "CnH2n+2", "CnH2n-2", "CnHn"], ans: 1 },
      { q: "Which type of hybridization is found in carbon atoms of methane?", opts: ["sp", "sp2", "sp3", "dsp2"], ans: 2 },
      { q: "What is the main reaction type for saturated hydrocarbons?", opts: ["Addition", "Substitution", "Polymerization", "Elimination"], ans: 1 },
      { q: "The bond angle in a methane molecule is:", opts: ["90°", "120°", "109.5°", "180°"], ans: 2 },
      { q: "Which of these is the main component of natural gas?", opts: ["Ethane", "Methane", "Propane", "Butane"], ans: 1 },
      { q: "What is the C-C bond length in alkanes?", opts: ["0.120 nm", "0.134 nm", "0.154 nm", "0.140 nm"], ans: 2 },
      { q: "Identify the formula of propane:", opts: ["C3H6", "C3H4", "C3H8", "C4H10"], ans: 2 },
      { q: "What products are formed during the complete combustion of alkanes?", opts: ["CO and H2", "CO2 and H2O", "C and H2O", "CO2 and H2"], ans: 1 },
      { q: "Which alkane is known as 'marsh gas'?", opts: ["Ethane", "Propane", "Methane", "Butane"], ans: 2 },
      { q: "What is the physical state of the first four alkanes (C1-C4)?", opts: ["Liquids", "Gases", "Solids", "Plasma"], ans: 1 },
      { q: "In the IUPAC name '2-methylpropane', what does 'propane' represent?", opts: ["Side chain", "Main chain", "Functional group", "Isomer"], ans: 1 },
      { q: "The process of splitting large alkane molecules into smaller ones is called:", opts: ["Hydrogenation", "Cracking", "Oxidation", "Nitration"], ans: 1 },
      { q: "What catalyst is used in the Wurtz reaction?", opts: ["Nickel", "Sodium", "Platinum", "Iron"], ans: 1 },
      { q: "Alkanes are generally insoluble in:", opts: ["Benzene", "Water", "Ether", "Chloroform"], ans: 1 },
      { q: "What is the number of isomers for butane?", opts: ["1", "2", "3", "4"], ans: 1 },
      { q: "How many hydrogen atoms are in a hexane molecule?", opts: ["12", "14", "10", "16"], ans: 1 },
      { q: "Алкандардағы көміртек атомының валенттілігі қандай?", opts: ["II", "III", "IV", "I"], ans: 2 },
      { q: "Этан молекуласында неше сигма байланыс бар?", opts: ["5", "6", "7", "8"], ans: 2 },
      { q: "Алкандарды хлорлау реакциясы қандай жағдайда жүреді?", opts: ["Жарықта", "Суықта", "Катализаторсыз қараңғыда", "Тек қысыммен"], ans: 0 },
      { q: "Зертханада метанды қандай заттан алады?", opts: ["Натрий ацетаты", "Көміртек", "Кальций карбиді", "Этанол"], ans: 0 }
    ]
  },
  'massalar': {
    subj: 'Аналитикалық химия', topic: 'Әрекеттесуші массалар заңы',
    qs: [
      { q: "Who formulated the Law of Mass Action in 1864?", opts: ["Le Chatelier", "Guldberg and Waage", "Arrhenius", "Mendeleev"], ans: 1 },
      { q: "The rate of a chemical reaction is proportional to the product of the concentrations of:", opts: ["Products", "Reactants", "Catalysts", "Inhibitors"], ans: 1 },
      { q: "What symbol is commonly used for the equilibrium constant?", opts: ["R", "K", "T", "P"], ans: 1 },
      { q: "In a homogeneous system, all components are in the same:", opts: ["Volume", "Phase", "Container", "Temperature"], ans: 1 },
      { q: "The equilibrium constant (K) depends only on:", opts: ["Pressure", "Concentration", "Temperature", "Catalyst"], ans: 2 },
      { q: "What happens to the equilibrium if a catalyst is added?", opts: ["Shifts right", "Shifts left", "No change", "K increases"], ans: 2 },
      { q: "Le Chatelier's principle helps to predict the shift in:", opts: ["Reaction rate", "Equilibrium", "Activation energy", "Atomic mass"], ans: 1 },
      { q: "If K > 1, the equilibrium position favors the:", opts: ["Reactants", "Products", "Middle", "Inhibitor"], ans: 1 },
      { q: "An exothermic reaction releases:", opts: ["Mass", "Heat", "Volume", "Pressure"], ans: 1 },
      { q: "What is the unit of concentration used in the law of mass action?", opts: ["g/L", "mol/L", "mol/kg", "Percentage"], ans: 1 },
      { q: "Increasing the pressure will shift the equilibrium towards the side with:", opts: ["More gas moles", "Fewer gas moles", "No gas", "Liquids only"], ans: 1 },
      { q: "In a heterogeneous reaction, the concentration of which phase is omitted from the K expression?", opts: ["Gas", "Liquid", "Solid", "Aqueous"], ans: 2 },
      { q: "Chemical equilibrium is a ______ state.", opts: ["Static", "Dynamic", "Passive", "Unstable"], ans: 1 },
      { q: "The ratio of the rate constants of the forward and reverse reactions is:", opts: ["Activation energy", "Equilibrium constant", "Gibbs energy", "Enthalpy"], ans: 1 },
      { q: "If we increase the concentration of reactants, the equilibrium shifts:", opts: ["To the left", "To the right", "Doesn't move", "To the bottom"], ans: 1 },
      { q: "Reversible reactions can proceed in ______ directions.", opts: ["One", "Two", "Three", "Four"], ans: 1 },
      { q: "Температураны көтергенде экзотермиялық реакция қайда ығысады?", opts: ["Оңға", "Солға", "Өзгермейді", "Жылдамдығы азаяды"], ans: 1 },
      { q: "Гомогенді реакцияға мысал келтіріңіз:", opts: ["Газ бен газ", "Қатты зат пен сұйықтық", "Екі ерімейтін сұйықтық", "Металл мен қышқыл"], ans: 0 },
      { q: "Жүйедегі қысымды төмендеткенде тепе-теңдік қай жаққа ығысады?", opts: ["Көлем азайған жаққа", "Көлем көбейген жаққа", "Өзгермейді", "Температураға байланысты"], ans: 1 },
      { q: "Vant-Hoff ережесі бойынша температура 10 градусқа көтерілсе жылдамдық неше есе артады?", opts: ["2-4 есе", "10 есе", "5 есе", "Өзгермейді"], ans: 0 }
    ]
  }
  // Қалған тақырыптар (Алкендер, Ерітінді, Ғылыми мақала) дәл осы принциппен толтырылады.
};

function openTest(id) {
  const name = document.getElementById('studentName').value;
  const group = document.getElementById('studentGroup').value;
  if(!name || !group) return alert("Аты-жөніңізді жазыңыз!");

  const test = tests[id];
  let html = `<div class="test-page active">
    <button class="back-btn" onclick="location.reload()">← Мәзірге қайту</button>
    <h2>${test.subj}: ${test.topic}</h2>
    <form id="active-form">`;

  test.qs.forEach((item, i) => {
    html += `<div class="q"><p>${i+1}. ${item.q}</p>`;
    item.opts.forEach((opt, j) => {
      html += `<label style="display:block; margin-bottom:5px;">
        <input type="radio" name="q${i}" value="${j}"> ${opt}
      </label>`;
    });
    html += `</div>`;
  });

  html += `<button type="button" class="submit-btn" onclick="sendResult('${id}')">Нәтижені жіберу</button></form>
    <div id="status"></div></div>`;
  
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('test-container').innerHTML = html;
}

function sendResult(id) {
  const form = document.getElementById('active-form');
  const test = tests[id];
  let score = 0;

  test.qs.forEach((q, i) => {
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    if(sel && parseInt(sel.value) === q.ans) score++;
  });

  const data = {
    name: document.getElementById('studentName').value,
    group: document.getElementById('studentGroup').value,
    subject: test.subj,
    topic: test.topic,
    score: score,
    total: test.qs.length
  };

  document.getElementById('status').innerText = "Жіберілуде...";
  
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(data)
  }).then(() => {
    alert(`Тест аяқталды! Сіздің балыңыз: ${score}/${test.qs.length}`);
    location.reload();
  });
}
</script>
</body>
</html>
