<html lang="kk">
<head>

<title>Zhetysu University - Chemistry CLIL</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* Правильный ответ */
.correct-answer {
  border-color: var(--success) !important;
  background-color: #d4edda !important;
  color: #155724;
}

/* Неправильный ответ */
.wrong-answer {
  border-color: var(--primary) !important;
  background-color: #f8d7da !important;
  color: #721c24;
}

/* Итоговый балл */
.score-display {
  font-size: 1.5rem;
  text-align: center;
  margin-bottom: 20px;
  padding: 20px;
  background: var(--secondary);
  color: white;
  border-radius: 8px;
}
:root { 
  --primary: #8C1515; 
  --secondary: #2E2D29; 
  --bg: #F4F4F4;
  --white: #FFFFFF;
  --text: #2E2D29;
  --success: #28a745;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --transition: all 0.25s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Montserrat', sans-serif; 
  background-color: var(--bg); 
  color: var(--text); 
  line-height: 1.6;
}

header { 
  background: var(--white); 
  padding: 30px 20px; 
  text-align: center; 
  border-bottom: 3px solid var(--primary);
  box-shadow: var(--shadow);
}

.uni-info h1 { 
  color: var(--primary); 
  font-size: 1.3rem; 
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.uni-info p { 
  color: var(--secondary); 
  font-weight: 600; 
  font-size: 0.95rem;
  opacity: 0.9;
}

.hero { 
  background: var(--secondary); 
  color: var(--white); 
  padding: 60px 20px 100px; 
  text-align: center;
}

.hero h2 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }

.container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

.reg-card { 
  background: var(--white); 
  padding: 40px; 
  border-radius: 12px; 
  box-shadow: var(--shadow); 
  margin-top: -50px; 
}

.input-group {
  display: flex;
  gap: 15px;
  margin-bottom: 35px;
}

input { 
  flex: 1;
  font-family: inherit;
  padding: 14px 18px; 
  border: 1px solid #CCC; 
  border-radius: 8px; 
  font-size: 1rem;
  transition: var(--transition);
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(140, 21, 21, 0.1);
}

/* Дисциплина атауларын ортаға қою */
.section-title {
  font-size: 0.9rem;
  text-transform: uppercase;
  color: var(--primary);
  font-weight: 700;
  letter-spacing: 1.5px;
  margin: 35px 0 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.section-title::before, .section-title::after {
  content: "";
  flex: 1;
  height: 2px;
  background: #EEE;
}

.menu-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
  gap: 15px; 
}

.menu-btn { 
  background: var(--white); 
  border: 1px solid #DDD; 
  color: var(--secondary); 
  padding: 22px; 
  border-radius: 8px; 
  cursor: pointer; 
  font-size: 1.05rem; 
  font-weight: 600; 
  transition: var(--transition);
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-btn:hover { 
  background: #FFF9F9;
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(140, 21, 21, 0.08);
}

.test-box { display: none; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: var(--shadow); }
.active { display: block; }

/* Сұрақтар мен жауаптар арақашықтығы */
.question { 
  margin-bottom: 30px; /* Әр сұрақтың арасы */
  padding: 25px; 
  border-radius: 8px;
  background: #FAFAFA; 
  border-left: 5px solid var(--primary);
}

.question p { 
  font-weight: 700; 
  font-size: 1.1rem; 
  margin-bottom: 20px; /* Сұрақ пен бірінші жауаптың арасы */
}

label {
  display: block;
  padding: 14px 18px;    
  margin-bottom: 12px;   /* Жауаптардың (нұсқалардың) арасы */
  border-radius: 8px;
  background: white;
  border: 1px solid #EEE;
  cursor: pointer;
  transition: var(--transition);
}

label:hover { border-color: var(--primary); background: #FFF9F9; }

/* "Жіберу" батырмасы */
.submit-btn { 
  background: var(--primary); 
  color: var(--white); 
  padding: 18px; 
  border: none; 
  border-radius: 8px; 
  font-size: 1.1rem; 
  font-weight: 700; 
  cursor: pointer; 
  width: 100%; 
  margin-top: 25px;
}

.submit-btn:hover { background: #701111; }

/* Мұғалімге жіберілгені туралы жасыл хабарлама стилі */
.status-message {
  display: none; 
  color: var(--success); 
  font-weight: 700;
  font-size: 1.2rem;
  text-align: center;
  margin-top: 20px;
  padding: 15px;
  border: 2px solid var(--success);
  border-radius: 8px;
  background-color: #f8fff9;
  animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .input-group { flex-direction: column; }
  .uni-info h1 { font-size: 1.1rem; }
}
</style>

    <form id="quiz-form">`;

  test.questions.forEach((item, i) => {
    html += `<div class="question"><p>${i+1}. ${item.q}</p>`;
    item.a.forEach((opt, j) => {
      html += `<label><input type="radio" name="q${i}" value="${j}" required> <span>${opt}</span></label>`;
    });
    html += `</div>`;
  });

  html += `
    <button type="button" id="submit-btn" class="submit-btn" onclick="finishTest('${id}')">Нәтижені жіберу</button>
    <div id="final-status" class="status-message">Нәтижеңіз мұғалімге жіберілді!</div>
    </form></div>`;
  
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('test-view').innerHTML = html;
  window.scrollTo(0,0);
}

function finishTest(id) {
  const btn = document.getElementById('submit-btn');
  const form = document.getElementById('quiz-form');
  const statusMsg = document.getElementById('final-status');
  const test = quizData[id];
  
  if (!form.checkValidity()) return alert("Барлық сұраққа жауап беріңіз!");

  let score = 0;
  
  // 1. Проверка ответов
  test.questions.forEach((q, i) => {
    const questionDiv = form.querySelectorAll('.question')[i];
    const labels = questionDiv.querySelectorAll('label');
    const selectedInput = form.querySelector(`input[name="q${i}"]:checked`);
    const selectedIndex = parseInt(selectedInput.value);

    labels[q.c].classList.add('correct-answer');

    if (selectedIndex === q.c) {
      score++;
    } else {
      labels[selectedIndex].classList.add('wrong-answer');
    }

    questionDiv.querySelectorAll('input').forEach(input => input.disabled = true);
  });

  // 2. Показ результата
  const scoreHtml = `<div class="score-display">
    Сіздің нәтижеңіз: ${score} / ${test.questions.length}<br>
    <small>Дұрыс жауаптар жасыл түспен белгіленді</small>
  </div>`;
  
  form.insertAdjacentHTML('afterbegin', scoreHtml);

  // 3. Отправка данных
  btn.disabled = true;
  btn.innerText = "Жіберілуде...";

  const data = {
    name: document.getElementById('userName').value.trim(),
    group: document.getElementById('userGroup').value.trim(),
    discipline: test.discipline,
    topic: test.title,
    score: score,
    total: test.questions.length
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(() => {
    btn.style.display = 'none';
    statusMsg.style.display = 'block';
    window.scrollTo(0,0);
  }).catch(() => {
    alert("Қате кетті.");
    btn.disabled = false;
    btn.innerText = "Қайта жіберу";
  });
}
</script>
